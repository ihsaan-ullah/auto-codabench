version: 2
title: PARSEME shared task 1.2 on semi-supervised identification of verbal MWEs (results submission)
description: The third edition of the PARSEME shared task on automatic identification of verbal multiword
  expressions (VMWEs) aims at identifying verbal MWEs in running texts. Verbal MWEs include, among others,
  verbal idioms (to let the cat out of the bag), light-verb constructions (to make a decision), verb-particle
  constructions (to give up), multi-verb constructions (to make do) and inherently reflexive verbs (s'évanouir
  'to faint' in French). Their identification is a well-known challenge for NLP applications, due to their
  complex characteristics including discontinuity, overlaps, non-compositionality, heterogeneity and syntactic
  variability.
